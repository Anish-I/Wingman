# Local development services only — do not use in production.
# Start with: docker compose up -d

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: wingman
      POSTGRES_PASSWORD: wingman
      POSTGRES_DB: wingman
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-wingman_dev}"]
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  pgdata:
