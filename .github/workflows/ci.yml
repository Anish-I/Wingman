name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wingman
          POSTGRES_PASSWORD: wingman
          POSTGRES_DB: wingman
        ports: ["5432:5432"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run tests
        run: cd server && npm test
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://wingman:wingman@localhost:5432/wingman
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          MESSAGING_PROVIDER: stub

      - name: Run lint (if configured)
        run: cd server && npm run lint --if-present

      - name: TypeScript check (mobile)
        run: cd mobile && npx tsc --noEmit || true
